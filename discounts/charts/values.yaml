# values for discounts chart
replicaCount: 1

image:
  repository: quay.io/dseveria/discounts
  tag: v1.0.1
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

service:
  port: 8080
  targetPort: 8080

route:
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

configmap:
  application:
    colour: black
    mode: online
    version: v1.0.1
  quarkus:
    log:
      level: debug