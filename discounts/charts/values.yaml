replicaCount: 1

image:
  repository: quay.io/dseveria/discounts
  tag: v1.0.1
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

route:
  targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

config:
  application:
    colour: black
    mode: online
    version: v1.0.1
  quarkus:
    log:
      level: debug