apiVersion: v1
kind: Service
metadata:
  name: {{ include "discounts.fullname" . }}
spec:
  ports:
  - name: http
    port: {{ .Values.service.port }}
    protocol: TCP
    targetPort: {{ .Values.service.targetPort }}
  selector:
    {{- include "discounts.selectorLabels" | nindent 4 }}
  type: {{ .Values.service.type }}